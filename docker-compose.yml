name: ${COMPOSE_PROJECT_NAME:-draftea-lens}

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: ${COMPOSE_PROJECT_NAME:-draftea-lens}-api:latest
    container_name: ${COMPOSE_PROJECT_NAME:-draftea-lens}-api
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 3000
      THE_ODDS_API_KEY: ${THE_ODDS_API_KEY:-}
      SERVER_ID: ${SERVER_ID:-local-dev}
      SERVER_ROLE: ${SERVER_ROLE:-primary}
      COLLECTOR_ENABLED: ${COLLECTOR_ENABLED:-false}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-false}
      REAL_STAKE_ENABLED: ${REAL_STAKE_ENABLED:-false}
      DATA_DIR: /app/apps/api/data
    ports:
      - "${API_PORT:-3010}:3000"
    volumes:
      - draftea_api_data:/app/apps/api/data
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:3000/dashboard/overview').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    image: ${COMPOSE_PROJECT_NAME:-draftea-lens}-web:latest
    container_name: ${COMPOSE_PROJECT_NAME:-draftea-lens}-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-4210}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  draftea_api_data:
    name: ${COMPOSE_PROJECT_NAME:-draftea-lens}_api_data
